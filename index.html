<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rooftop Countdown — Level 40</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="terminal">
    <!-- Sticky countdown header (shown from Scene 3 onward) -->
    <div id="stickyBar" class="stickyBar">
      <div class="stickyLabel">COUNTDOWN TO MISSION START</div>
      <div id="stickyCountdown" class="stickyCountdown">-- : -- : -- : --</div>
    </div>

    <!-- Main terminal content area -->
    <div id="terminalInner" class="terminalInner" aria-live="polite">
      <!-- Tap-to-focus hint (position:absolute within terminalInner) -->
      <div id="hint" class="hint">tap to focus</div>
    </div>

    <!-- Hidden input for keyboard capture (mobile-safe) -->
    <input
      id="hiddenInput"
      class="hiddenInput"
      type="text"
      inputmode="text"
      autocomplete="off"
      autocapitalize="none"
      spellcheck="false"
      aria-hidden="true"
    />

    <!-- Button zone — always reserves space (80px), buttons shown/hidden by JS -->
    <div id="mobileButtons" class="mobile-buttons">
      <button id="mobileBtn1" class="mobile-button">ENTER</button>
      <button id="mobileBtn2" class="mobile-button">YES</button>
      <button id="mobileBtn3" class="mobile-button">NO</button>
    </div>

    <!-- Version zone — always at bottom of terminal -->
    <div class="version-bar">
      <span id="version" class="version">v1.0.0</span>
    </div>

    <!-- Camera overlay — shown during Agent Face Scan -->
    <div id="cameraOverlay" class="camera-overlay" style="display:none">
      <video id="agentVideo" autoplay playsinline muted></video>
      <canvas id="captureCanvas" style="display:none"></canvas>
      <div class="scan-ui">
        <div class="scan-brackets">
          <span class="bracket tl">┌─</span>
          <span class="bracket tr">─┐</span>
          <span class="bracket bl">└─</span>
          <span class="bracket br">─┘</span>
        </div>
        <div class="scan-label" id="scanLabel">[ SCANNING... ]</div>
        <div class="scan-bar-wrap">
          <div class="scan-bar-track">
            <div class="scan-bar-fill" id="scanBarFill"></div>
          </div>
          <span class="scan-bar-pct" id="scanBarPct">0%</span>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
